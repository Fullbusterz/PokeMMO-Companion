name: Deploy web export to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # --legacy-peer-deps is required in this repo: known peer dependency
        # conflicts between react/react-native/expo packages.
        run: npm ci --legacy-peer-deps

      - name: Export static web build
        run: npx expo export -p web

      - name: SPA fallback for GitHub Pages (404.html = index.html)
        # web.output is "single" (SPA) -> any unknown path must fall back to the
        # app shell so expo-router can resolve the route client-side.
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
